services:
  quad_ocs2:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-humble}
        USER_NAME: ${USER_NAME:-ros}
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}

    image: quad_ocs2:${ROS_DISTRO:-humble}

    working_dir: /workspaces/quad_ocs2_ws
    stdin_open: true
    tty: true

    network_mode: host
    ipc: host

    gpus: all

    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_INDIRECT: "0"
      LIBGL_ALWAYS_SOFTWARE: "0"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,compute
      
      ROS_DISTRO: ${ROS_DISTRO:-humble}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-23}
      WS_DIR: /workspaces/quad_ocs2_ws
      XDG_RUNTIME_DIR: /tmp/runtime-${USER_NAME:-ros}

    volumes:
      - .:/workspaces/quad_ocs2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/input:/dev/input:ro

    # Needed for OpenGL / MuJoCo
    devices:
      - /dev/dri:/dev/dri

    device_cgroup_rules:
      - "c 13:* rmw"

    group_add:
      - "${INPUT_GID:-1000}"
